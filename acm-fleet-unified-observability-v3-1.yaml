        {
          "id": 35,
          "type": "text",
          "title": "\ud83d\udcd6 Best Practice Quick Reference",
          "gridPos": {
            "x": 0,
            "y": 40,
            "w": 24,
            "h": 11
          },
          "options": {
            "mode": "markdown",
            "content": "### \ud83d\udcda Best Practices Reference\n\n| Topic | Source | Guideline |\n|-------|--------|-----------|\n| **Resource requests** | CNCF | Every container MUST declare CPU & Memory requests for QoS class |\n| **Memory limits** | Red Hat OCP | Memory limit should equal request for Guaranteed QoS |\n| **CPU overcommit** | Red Hat sizing | OK up to 150% (CPU compressible) |\n| **Memory overcommit** | Red Hat sizing | \u2264 100% (memory NOT compressible) |\n| **HA replicas** | Red Hat OCP | Production: \u22652 replicas + PDB + topology spread |\n| **etcd DB size** | Red Hat OCP | Hard limit 8GB; alert at 7GB; defrag regularly |\n| **API server latency** | Kubernetes SLO | p99 read <1s, p99 write <5s |\n| **etcd leader changes** | Red Hat OCP | <1/hour normal; >0.1/min = investigate |\n| **PVC capacity** | Industry | Alert at 85%, expand at 90% |\n| **ResourceQuota** | CNCF | Every app namespace needs one |\n| **LimitRange** | K8s best practice | Enforces default container limits |\n| **PodDisruptionBudget** | K8s HA | Required for multi-replica workloads |\n"
          }
        },
