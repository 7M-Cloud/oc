          "title": "\ud83d\udea8 Pods Without CPU Requests",
          "description": "CNCF: Every container MUST declare CPU requests for proper scheduling. Missing requests cause node over-allocation.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 6,
            "h": 4
          },
          "links": [
