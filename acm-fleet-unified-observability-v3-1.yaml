            "mode": "markdown",
            "content": "# \ud83d\udcca ACM Fleet \u2014 Unified Observability v3.1\n**Capacity \u2022 Overcommitment \u2022 Action Items \u2022 Drill-down \u2014 aligned with CNCF & Red Hat best practices**\n\n### \ud83c\udfaf How to use\n1. Select **Cluster** (or *All* for fleet) and **Workload Scope** (Platform / Application / All)\n2. Review **Executive Summary** then **Top 5 Stressed Clusters**\n3. Check **Operators / etcd / API** for platform health\n4. Use **Namespace / Pod tables** to drill in (click rows)\n5. Cross-check **Active Alerts**\n6. Scroll down for **vCPU / Memory / Storage / Network** capacity detail\n\n### \ud83d\udd0d Drill-down\nEvery panel has a \ud83d\udd0d drill-down link in the panel menu. Click any **cluster / namespace / pod** in tables and bar gauges to drill in directly.\n\n### \ud83c\udfa8 Legend\n\ud83d\udfe2 Healthy &nbsp;&nbsp; \ud83d\udfe1 Warning &nbsp;&nbsp; \ud83d\udd34 Critical &nbsp;&nbsp; \ud83d\udd35 Click to drill in\n"
