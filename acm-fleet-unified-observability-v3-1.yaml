          ],
          "targets": [
            {
              "refId": "A",
              "expr": "(count(group by (namespace, pod) (kube_pod_info{cluster=~\"$cluster\", namespace${workload_scope:raw}})) OR on() vector(0)) - (count(group by (namespace, pod) (kube_pod_container_resource_requests{cluster=~\"$cluster\", namespace${workload_scope:raw}, resource=\"cpu\"})) OR on() vector(0))",
